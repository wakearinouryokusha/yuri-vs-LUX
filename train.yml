name: AI Auto-Training

on:
  schedule:
    # 毎日 AM 4:00 JST (UTC 19:00) に自動実行
    - cron: '0 19 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ai_model.json をコミットするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: AI 学習実行
        run: node train.js

      - name: 学習結果をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_model.json train_history.json
          # 変更がなければスキップ
          git diff --staged --quiet && echo "変更なし（スキップ）" || \
            git commit -m "🤖 AI auto-train: $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
